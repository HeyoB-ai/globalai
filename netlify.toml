[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback: alle routes serveren index.html.
# Let op: dit staat ná de impliciete /.netlify/functions/* routing, dus
# functie-aanroepen worden niet door deze catch-all opgeslokt.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
